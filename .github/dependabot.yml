# Dependabot config — GitHub-native dependency updates with cooldown
# defence against fresh-published supply-chain compromises (eslint-style
# attacks discovered within hours of publish).
#
# Cooldown: non-security updates wait 7 days after release before a PR
# is opened. Security advisories (GHSA + OSV) bypass cooldown entirely
# — they're meant to land fast.
#
# Grouping: ALL update types (patch + minor + major) collapsed into a
# single group per ecosystem. Combined with `open-pull-requests-limit: 1`,
# this caps each ecosystem at exactly one PR per week (or zero when no
# deps need updating). Dependabot can't merge across ecosystems —
# cargo, npm, and github-actions own different lockfiles — so the
# upper bound across the whole repo is 3 PRs/week.
#
# Reference: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # Rust workspace — every Cargo.toml + Cargo.lock at root.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      cargo:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
          - major
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # npm — root meta wrapper. The platform binaries (-darwin-arm64 etc.)
  # are generated by `scripts/prepare-release.mjs` from this root, so
  # there's no separate npm config to track.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
      semver-major-days: 14
    # @typescript/native-preview ships dev releases multiple times per
    # week; cooldown alone would block updates indefinitely. Skip its
    # patch-bump churn — the version pin in package.json is open
    # (`>=7.0.0-dev.0`), so users always get the latest at install.
    ignore:
      - dependency-name: "@typescript/native-preview"
        update-types:
          - version-update:semver-patch
    groups:
      npm:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
          - major
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # GitHub Actions used by the cargo-deny workflow (and any future ones).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
          - major
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(deps)"
      include: scope
