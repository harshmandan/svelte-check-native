# Dependabot config — GitHub-native dependency updates with cooldown
# defence against fresh-published supply-chain compromises (eslint-style
# attacks discovered within hours of publish).
#
# Cooldown: non-security updates wait 7 days after release before a PR
# is opened. Security advisories (GHSA + OSV) bypass cooldown entirely
# — they're meant to land fast.
#
# Grouping: one PR per ecosystem per week for routine updates so the
# review queue stays small. Security PRs are individual (so each can be
# triaged on its own merits).
#
# Reference: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # Rust workspace — every Cargo.toml + Cargo.lock at root.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      cargo-patch-and-minor:
        update-types:
          - patch
          - minor
      cargo-major:
        update-types:
          - major
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # npm — root meta wrapper. The platform binaries (-darwin-arm64 etc.)
  # are generated by `scripts/prepare-release.mjs` from this root, so
  # there's no separate npm config to track.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
      semver-major-days: 14
    # @typescript/native-preview ships dev releases multiple times per
    # week; cooldown alone would block updates indefinitely. Allow it
    # through faster (1 day) since it's the load-bearing tsgo binary
    # and we want fresh tsgo on the supported floor.
    ignore:
      - dependency-name: "@typescript/native-preview"
        update-types:
          - version-update:semver-patch
    groups:
      npm-patch-and-minor:
        update-types:
          - patch
          - minor
      npm-major:
        update-types:
          - major
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # GitHub Actions used by the cargo-deny workflow (and any future ones).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(deps)"
      include: scope
